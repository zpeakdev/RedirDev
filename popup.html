<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DNR 重定向</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <h1 class="title">网络拦截与重定向</h1>

      <label class="row toggle">
        <span>启用</span>
        <input id="enabled" type="checkbox" />
      </label>

      <div class="section">
        <label class="field">
          <span>匹配规则 (URL)</span>
          <input id="matchUrl" type="text" placeholder="例如：example.com 或 *://example.com/*" />
        </label>

        <label class="field">
          <span>目标地址 (Redirect URL)</span>
          <input id="redirectUrl" type="text" placeholder="例如：https://example.com/new" />
        </label>
      </div>

      <button id="saveBtn" class="btn" type="button">保存并添加规则</button>
      <div id="status" class="status" aria-live="polite"></div>

      <div class="section list">
        <div class="listHeader">
          <strong>已保存规则</strong>
          <span id="ruleCount" class="muted">0 条</span>
        </div>
        <div id="rulesList" class="rulesList"></div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
